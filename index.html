<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASH Prestige Custom — Véhicules & Carrosserie — Mions (69)</title>
<meta name="description" content="ASH Prestige Custom — Vente de véhicules d'occasion prestige et service carrosserie professionnel à Mions (69).">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#000;font-family:'Outfit',sans-serif;color:#fff}
::selection{background:#c0c0c0;color:#000}

/* === SPLIT LAYOUT === */
.split{display:flex;height:100vh;position:relative}

.panel{flex:1;position:relative;overflow:hidden;cursor:pointer;transition:flex .6s cubic-bezier(.16,1,.3,1)}
.panel:hover{flex:1.15}
.panel:not(:hover){flex:.92}
.split:not(:hover) .panel{flex:1}

/* Background images / previews */
.panel-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .8s cubic-bezier(.16,1,.3,1),filter .6s}
.panel:hover .panel-bg{transform:scale(1.05)}
.panel-overlay{position:absolute;inset:0;transition:opacity .6s}

/* Left panel - Vente */
.panel-vente .panel-bg{background-image:url('https://images.unsplash.com/photo-1563720223185-11003d516935?w=1200&q=80');background-position:center 40%}
.panel-vente .panel-overlay{background:linear-gradient(135deg,rgba(0,0,0,.75) 0%,rgba(0,0,0,.5) 50%,rgba(0,0,0,.7) 100%)}
.panel-vente:hover .panel-overlay{background:linear-gradient(135deg,rgba(0,0,0,.6) 0%,rgba(0,0,0,.35) 50%,rgba(0,0,0,.55) 100%)}

/* Right panel - Carrosserie */
.panel-carro .panel-bg{background-image:url('https://images.unsplash.com/photo-1619642751034-765dfdf7c58e?w=1200&q=80');background-position:center 60%}
.panel-carro .panel-overlay{background:linear-gradient(225deg,rgba(0,0,0,.75) 0%,rgba(0,0,0,.5) 50%,rgba(0,0,0,.7) 100%)}
.panel-carro:hover .panel-overlay{background:linear-gradient(225deg,rgba(0,0,0,.6) 0%,rgba(0,0,0,.35) 50%,rgba(0,0,0,.55) 100%)}

/* Panel content */
.panel-content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:center;padding:60px;transition:transform .5s cubic-bezier(.16,1,.3,1)}
.panel-vente .panel-content{align-items:flex-start;padding-right:100px}
.panel-carro .panel-content{align-items:flex-end;padding-left:100px;text-align:right}

.panel-tag{font-size:10px;letter-spacing:6px;text-transform:uppercase;color:rgba(192,192,192,.7);margin-bottom:16px;opacity:0;transform:translateY(20px);animation:fadeUp .8s .4s forwards}
.panel-h{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,5vw,72px);font-weight:700;line-height:1;text-transform:uppercase;letter-spacing:3px;opacity:0;transform:translateY(30px);animation:fadeUp .8s .6s forwards}
.panel-sub{font-size:13px;color:rgba(255,255,255,.5);margin-top:14px;line-height:1.7;max-width:320px;opacity:0;transform:translateY(20px);animation:fadeUp .8s .8s forwards}
.panel-arrow{display:inline-flex;align-items:center;gap:10px;margin-top:28px;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--ac,#c0c0c0);text-decoration:none;opacity:0;transform:translateY(20px);animation:fadeUp .8s 1s forwards;transition:gap .3s}
.panel:hover .panel-arrow{gap:16px}
.panel-arrow svg{transition:transform .3s}
.panel:hover .panel-arrow svg{transform:translateX(4px)}

/* Hover glow line on edges */
.panel-vente::after{content:'';position:absolute;top:0;right:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent 10%,rgba(192,192,192,.15) 50%,transparent 90%);z-index:5;transition:opacity .3s;opacity:0}
.panel-vente:hover::after{opacity:1}
.panel-carro::before{content:'';position:absolute;top:0;left:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent 10%,rgba(192,192,192,.15) 50%,transparent 90%);z-index:5;transition:opacity .3s;opacity:0}
.panel-carro:hover::before{opacity:1}

/* === CENTER LOGO + LIGHTNING === */
.center-bolt{position:absolute;left:50%;top:0;bottom:0;width:120px;transform:translateX(-50%);z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}

.center-logo{text-align:center;margin-bottom:24px;opacity:0;animation:fadeIn 1s .2s forwards}
.center-logo-main{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:#fff;text-shadow:0 0 40px rgba(0,0,0,.8)}
.center-logo-sub{font-size:8px;letter-spacing:6px;text-transform:uppercase;color:rgba(192,192,192,.6);margin-top:2px}

/* Lightning bolt SVG */
.bolt-svg{opacity:0;animation:boltIn 1s .5s forwards;filter:drop-shadow(0 0 20px rgba(192,192,192,.3)) drop-shadow(0 0 60px rgba(192,192,192,.1))}
@keyframes boltIn{0%{opacity:0;transform:scaleY(.7)}60%{opacity:1;transform:scaleY(1.02)}100%{opacity:1;transform:scaleY(1)}}

/* Glow pulse on bolt */
.bolt-glow{animation:boltGlow 3s 1.5s infinite ease-in-out}
@keyframes boltGlow{0%,100%{filter:drop-shadow(0 0 15px rgba(192,192,192,.2)) drop-shadow(0 0 40px rgba(192,192,192,.05))}50%{filter:drop-shadow(0 0 25px rgba(192,192,192,.4)) drop-shadow(0 0 60px rgba(192,192,192,.15))}}

/* Sparks */
.spark{position:absolute;width:3px;height:3px;border-radius:50%;background:rgba(192,192,192,.8);opacity:0}
.spark-1{left:52%;top:38%;animation:sparkle 2.5s 2s infinite}
.spark-2{left:46%;top:55%;animation:sparkle 2.5s 2.8s infinite}
.spark-3{left:55%;top:48%;animation:sparkle 2.5s 3.3s infinite}
.spark-4{left:48%;top:62%;animation:sparkle 2.5s 1.8s infinite}
@keyframes sparkle{0%{opacity:0;transform:scale(0)}15%{opacity:1;transform:scale(1.5)}30%{opacity:0;transform:scale(0)}100%{opacity:0}}

/* Left/right labels on bolt */
.bolt-label{position:absolute;font-size:8px;letter-spacing:4px;text-transform:uppercase;color:rgba(192,192,192,.35);white-space:nowrap}
.bolt-label-left{left:-50px;top:50%;transform:translateY(-50%) rotate(-90deg)}
.bolt-label-right{right:-60px;top:50%;transform:translateY(-50%) rotate(90deg)}

/* === ANIMATIONS === */
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{to{opacity:1}}

/* === MOBILE === */
@media(max-width:768px){
  .split{flex-direction:column}
  .panel:hover{flex:1.1}
  .panel:not(:hover){flex:.95}
  .panel-content{padding:40px 30px!important;justify-content:flex-end;padding-bottom:60px!important}
  .panel-vente .panel-content,.panel-carro .panel-content{align-items:center;text-align:center;padding-right:30px!important;padding-left:30px!important}
  .center-bolt{left:0;right:0;top:auto;bottom:auto;width:100%;height:60px;transform:none;flex-direction:row;top:50%;margin-top:-30px}
  .center-bolt svg{transform:rotate(90deg)}
  .bolt-label{display:none}
  .center-logo{display:none}
  .panel-h{font-size:32px!important}
}
</style>
</head>
<body>

<div class="split">

  <!-- LEFT: VENTE -->
  <a href="vente.html" class="panel panel-vente" style="text-decoration:none;color:#fff">
    <div class="panel-bg"></div>
    <div class="panel-overlay"></div>
    <div class="panel-content">
      <span class="panel-tag">Collection</span>
      <h1 class="panel-h">Véhicules</h1>
      <p class="panel-sub">Notre sélection de véhicules d'occasion prestige. BMW, Mercedes, Audi et plus encore.</p>
      <span class="panel-arrow">
        Découvrir
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </span>
    </div>
  </a>

  <!-- CENTER: LIGHTNING BOLT -->
  <div class="center-bolt">
    <div class="center-logo">
      <div class="center-logo-main">ASH</div>
      <div class="center-logo-sub">Prestige Custom</div>
    </div>
    <svg class="bolt-svg bolt-glow" width="48" height="220" viewBox="0 0 48 220" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Lightning bolt shape -->
      <path d="M28 0 L32 0 L20 95 L36 95 L14 220 L18 130 L4 130 Z" fill="url(#boltGrad)" stroke="rgba(192,192,192,.3)" stroke-width=".5"/>
      <!-- Inner glow line -->
      <path d="M27 8 L30 8 L19.5 92 L33 92 L15.5 210 L19 132 L7 132 Z" fill="none" stroke="rgba(255,255,255,.08)" stroke-width=".5"/>
      <defs>
        <linearGradient id="boltGrad" x1="24" y1="0" x2="24" y2="220" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="rgba(200,200,210,.6)"/>
          <stop offset="30%" stop-color="rgba(192,192,192,.4)"/>
          <stop offset="50%" stop-color="rgba(220,220,230,.5)"/>
          <stop offset="70%" stop-color="rgba(192,192,192,.35)"/>
          <stop offset="100%" stop-color="rgba(160,160,170,.2)"/>
        </linearGradient>
      </defs>
    </svg>
    <!-- Sparks -->
    <div class="spark spark-1"></div>
    <div class="spark spark-2"></div>
    <div class="spark spark-3"></div>
    <div class="spark spark-4"></div>
    <!-- Side labels -->
    <span class="bolt-label bolt-label-left">Vente</span>
    <span class="bolt-label bolt-label-right">Carrosserie</span>
  </div>

  <!-- RIGHT: CARROSSERIE -->
  <a href="carrosserie.html" class="panel panel-carro" style="text-decoration:none;color:#fff">
    <div class="panel-bg"></div>
    <div class="panel-overlay"></div>
    <div class="panel-content">
      <span class="panel-tag">Atelier</span>
      <h1 class="panel-h">Carrosserie</h1>
      <p class="panel-sub">Réparation, peinture, débosselage. Estimez vos réparations en ligne.</p>
      <span class="panel-arrow">
        Découvrir
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </span>
    </div>
  </a>

</div>

</body>
</html>
